services:
  web:
    build:
      context: .
    ports:
      - "80:3000"
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
      - rails_storage:/rails/storage
    environment:
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: development_secret_key_base_for_timeline_creator
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    stdin_open: true
    tty: true

volumes:
  bundle:
  rails_storage:
